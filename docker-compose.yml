services:
  holo-rick:
    build: .
    container_name: holo-rick
    restart: unless-stopped
    ports:
      - "127.0.0.1:8362:8362"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8362"
      FLASK_DEBUG: "false"
    volumes:
      - ./instance:/app/instance
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8362/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
